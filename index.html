<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KlocVork Notes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- LOGIN SCREEN -->
  <div id="loginScreen">
    <div class="brand">
      <span class="brand-icon">📝</span>
      <h1>KlocVork Notes</h1>
      <p class="brand-sub">Your thoughts, beautifully kept.</p>
    </div>

    <div class="auth-box">
      <h2 id="authTitle">Welcome back</h2>

      <div class="input-group">
        <label for="emailInput">Email</label>
        <input type="email" id="emailInput" placeholder="you@example.com" autocomplete="email" />
      </div>

      <div class="input-group">
        <label for="passwordInput">Password</label>
        <input type="password" id="passwordInput" placeholder="••••••••" autocomplete="current-password" />
      </div>

      <button id="authBtn" onclick="handleAuth()">
        <span id="authBtnText">Sign In</span>
        <span id="authBtnSpinner" class="spinner hidden"></span>
      </button>

      <p id="authError" class="error" role="alert"></p>

      <p class="toggle-text">
        <span id="toggleText">Don't have an account?</span>
        <a href="#" onclick="toggleMode()" id="toggleLink">Sign Up</a>
      </p>
    </div>
  </div>

  <!-- NOTES SCREEN -->
  <div id="notesScreen" class="hidden">
    <header class="notes-header">
      <h1>📝 My Notes</h1>
      <div class="user-info">
        <span id="userEmail"></span>
        <button onclick="logout()" class="logout-btn">Logout</button>
      </div>
    </header>

    <div class="note-composer">
      <textarea id="noteInput" placeholder="What's on your mind?"></textarea>
      <div class="composer-actions">
        <span id="charCount" class="char-count">0 / 1000</span>
        <button id="saveBtn" onclick="addNote()">
          <span id="saveBtnText">Save Note</span>
          <span id="saveBtnSpinner" class="spinner hidden"></span>
        </button>
      </div>
    </div>

    <p id="notesError" class="error" role="alert"></p>

    <div id="notesContainer">
      <p id="emptyState" class="empty-state hidden">No notes yet. Write something!</p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>
</body>
</html>
